{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center fw-bold mb-4">{{ _('Plan Your Next Adventure') }}</h3>
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="search-box" class="form-label fw-bold">{{ _('Search Location') }}</label>
                            <div class="input-group">
                                <input type="text" id="search-box" class="form-control" placeholder="{{ _('Search city or country...') }}">
                                <button class="btn btn-outline-secondary" type="button" id="search-btn">{{ _('Search') }}</button>
                            </div>
                            <small class="text-muted">{{ _('Type and click Search to find on map') }}</small>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">{{ _('Map Preview') }}</label>
                            <div id="add-trip-map" class="map-container map-preview-size"></div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="country" class="form-label fw-bold">{{ _('Select Country') }}</label>
                            <select name="country" class="form-select" id="country" required>
                                <option value="" disabled selected>{{ _('Select a country...') }}</option>
                                {% for country in countries %}
                                {% set ccode = get_country_code(country) %}
                                <option value="{{ country }}" data-code="{{ ccode }}">
                                    {{ country }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="destination" class="form-label fw-bold">{{ _('Select City') }}</label>
                            <input type="text" name="destination" class="form-control" id="destination" list="city-list" placeholder="{{ _('Search city...') }}" required>
                            <datalist id="city-list"></datalist>
                            <small class="text-muted">{{ _('Start typing to see suggestions') }}</small>
                        </div>
                    </div>

                    <!-- Hidden lat/lng fields -->
                    <input type="hidden" name="latitude" id="latitude">
                    <input type="hidden" name="longitude" id="longitude">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="start_date" class="form-label fw-bold">{{ _('Departure') }}</label>
                            <input type="date" name="start_date" class="form-control" id="start_date">
                            <small class="text-muted opacity-75">{{ _('Required for Planned/Visited') }}</small>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="end_date" class="form-label fw-bold">{{ _('Arrival') }}</label>
                            <input type="date" name="end_date" class="form-control" id="end_date">
                            <small class="text-muted opacity-75">{{ _('Required for Visited') }}</small>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="status" class="form-label fw-bold">{{ _('Status') }}</label>
                            <select name="status" class="form-select" id="status">
                                <option value="draft">{{ _('Draft') }}</option>
                                <option value="planned" selected>{{ _('Planned') }}</option>
                                <option value="visited">{{ _('Visited') }}</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="budget" class="form-label fw-bold">{{ _('Budget (optional)') }}</label>
                            <input type="number" step="0.01" name="budget" class="form-control" id="budget">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="accommodation" class="form-label fw-bold">{{ _('Accommodation Info') }}</label>
                        <input type="text" name="accommodation" class="form-control" id="accommodation" placeholder="{{ _('e.g. Hotel, Airbnb address... (Private)') }}">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="transport_mode" class="form-label fw-bold">{{ _('Transport Mode') }}</label>
                            <select name="transport_mode" class="form-select" id="transport_mode">
                                <option value="">{{ _('Select...') }}</option>
                                <option value="Flight">{{ _('Flight') }}</option>
                                <option value="Train">{{ _('Train') }}</option>
                                <option value="Bus">{{ _('Bus') }}</option>
                                <option value="Car">{{ _('Car') }}</option>
                                <option value="Ferry">{{ _('Ferry') }}</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="flight_number" class="form-label fw-bold">{{ _('Flight/Ticket #') }}</label>
                            <input type="text" name="flight_number" class="form-control" id="flight_number" placeholder="{{ _('e.g. LH1234') }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="visa_required" id="visa_required">
                            <label class="form-check-label fw-bold" for="visa_required">{{ _('Visa Required?') }}</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="attractions" class="form-label fw-bold">{{ _('Attractions / Plans') }}</label>
                        <textarea name="attractions" class="form-control" id="attractions" rows="2" placeholder="{{ _('What do you want to see?') }}"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="packing_list" class="form-label fw-bold">{{ _('Packing List') }}</label>
                        <textarea name="packing_list" class="form-control" id="packing_list" rows="2" placeholder="{{ _('Clothes, tech, documents...') }}"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="expense_estimate" class="form-label fw-bold">{{ _('Expense Estimate') }}</label>
                        <textarea name="expense_estimate" class="form-control" id="expense_estimate" rows="2" placeholder="{{ _('Food, transport, activities...') }}"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label fw-bold">{{ _('Notes') }}</label>
                        <textarea name="notes" class="form-control" id="notes" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold shadow-sm">{{ _('Save Adventure') }}</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var map = L.map('add-trip-map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        var marker;
        const countrySelect = document.getElementById('country');
        const destinationInput = document.getElementById('destination');
        const cityList = document.getElementById('city-list');

        function updateMarker(lat, lng) {
            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lng]).addTo(map);
            map.setView([lat, lng], 10);
            document.getElementById('latitude').value = lat;
            document.getElementById('longitude').value = lng;
        }

        let debounceTimer;
        destinationInput.addEventListener('input', function() {
            const query = this.value;
            const country = countrySelect.value;
            if (query.length < 2) return;

            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const fullQuery = country ? `${query}, ${country}` : query;
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(fullQuery)}&limit=5`)
                    .then(res => res.json())
                    .then(data => {
                        cityList.innerHTML = '';
                        data.forEach(item => {
                            const option = document.createElement('option');
                            option.value = item.display_name.split(',')[0];
                            option.dataset.lat = item.lat;
                            option.dataset.lon = item.lon;
                            cityList.appendChild(option);
                        });
                    });
            }, 300);
        });

        destinationInput.addEventListener('change', function() {
            const val = this.value;
            const options = cityList.options;
            for (let i = 0; i < options.length; i++) {
                if (options[i].value === val) {
                    updateMarker(parseFloat(options[i].dataset.lat), parseFloat(options[i].dataset.lon));
                    break;
                }
            }
        });

        function searchLocation(query) {
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.length > 0) {
                        updateMarker(parseFloat(data[0].lat), parseFloat(data[0].lon));
                    }
                });
        }

        document.getElementById('search-btn').addEventListener('click', function() {
            var query = document.getElementById('search-box').value;
            if (!query) return;
            searchLocation(query);
        });

        map.on('click', function(e) {
            updateMarker(e.latlng.lat, e.latlng.lng);
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}`)
                .then(response => response.json())
                .then(data => {
                    if (data.address) {
                        var country = data.address.country;
                        if (country) {
                            // Try to match country in select
                            for (let i = 0; i < countrySelect.options.length; i++) {
                                if (countrySelect.options[i].value === country) {
                                    countrySelect.selectedIndex = i;
                                    countrySelect.dispatchEvent(new Event('change'));
                                    break;
                                }
                            }
                        }
                    }
                });
        });
    });
</script>
{% endblock %}
