{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold mb-0">Edit Trip: {{ trip.destination }}</h3>
                    <form action="{{ url_for('main.delete_trip', trip_id=trip.id) }}" method="POST" onsubmit="return confirm('Are you sure you want to delete this trip?');">
                        <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3">Delete Trip</button>
                    </form>
                </div>
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="search-box" class="form-label fw-bold">Update Location</label>
                            <div class="input-group">
                                <input type="text" id="search-box" class="form-control" placeholder="Search city or country...">
                                <button class="btn btn-outline-secondary" type="button" id="search-btn">Search</button>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Map Preview</label>
                            <div id="add-trip-map" class="map-container" style="height: 200px;"></div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="country" class="form-label fw-bold">Country</label>
                            <select name="country" class="form-select" id="country" required>
                                {% for country in countries %}
                                <option value="{{ country }}" {% if trip.country == country %}selected{% endif %}>{{ country }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="destination" class="form-label fw-bold">Select City</label>
                            <select name="destination" class="form-select" id="destination" required>
                                <option value="{{ trip.destination }}" selected>{{ trip.destination }}</option>
                            </select>
                            <div class="mt-2">
                                <small class="text-muted">Or type manually if not in list:</small>
                                <input type="text" id="manual_destination" class="form-control form-control-sm mt-1" placeholder="Type city name...">
                            </div>
                        </div>
                    </div>

                    <input type="hidden" name="latitude" id="latitude" value="{{ trip.latitude }}">
                    <input type="hidden" name="longitude" id="longitude" value="{{ trip.longitude }}">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="start_date" class="form-label fw-bold">Start Date</label>
                            <input type="date" name="start_date" class="form-control" id="start_date" value="{{ trip.start_date }}">
                            <small class="text-muted opacity-75">Required for Planned/Visited</small>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="end_date" class="form-label fw-bold">End Date</label>
                            <input type="date" name="end_date" class="form-control" id="end_date" value="{{ trip.end_date }}">
                            <small class="text-muted opacity-75">Required for Visited</small>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="status" class="form-label fw-bold">Status</label>
                            <select name="status" class="form-select" id="status">
                                <option value="draft" {% if trip.status == 'draft' %}selected{% endif %}>Draft</option>
                                <option value="planned" {% if trip.status == 'planned' %}selected{% endif %}>Planned</option>
                                <option value="visited" {% if trip.status == 'visited' %}selected{% endif %}>Visited</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="budget" class="form-label fw-bold">Budget (approx.)</label>
                            <input type="number" step="0.01" name="budget" class="form-control" id="budget" value="{{ trip.budget }}" placeholder="e.g. 1500">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="accommodation" class="form-label fw-bold">Accommodation (Sensitive)</label>
                        <input type="text" name="accommodation" class="form-control" id="accommodation" value="{{ trip.accommodation }}" placeholder="Hotel name or address">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="transport_mode" class="form-label fw-bold">Transport Mode</label>
                            <select name="transport_mode" class="form-select" id="transport_mode">
                                <option value="" {% if not trip.transport_mode %}selected{% endif %}>Select...</option>
                                <option value="Flight" {% if trip.transport_mode == 'Flight' %}selected{% endif %}>Flight</option>
                                <option value="Train" {% if trip.transport_mode == 'Train' %}selected{% endif %}>Train</option>
                                <option value="Bus" {% if trip.transport_mode == 'Bus' %}selected{% endif %}>Bus</option>
                                <option value="Car" {% if trip.transport_mode == 'Car' %}selected{% endif %}>Car</option>
                                <option value="Ferry" {% if trip.transport_mode == 'Ferry' %}selected{% endif %}>Ferry</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="flight_number" class="form-label fw-bold">Flight/Ticket #</label>
                            <input type="text" name="flight_number" class="form-control" id="flight_number" value="{{ trip.flight_number }}" placeholder="e.g. LH1234">
                        </div>
                    </div>

                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="visa_required" id="visa_required" {% if trip.visa_required %}checked{% endif %}>
                            <label class="form-check-label fw-bold" for="visa_required">Visa Required?</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="attractions" class="form-label fw-bold">Planned Attractions / Plans</label>
                        <textarea name="attractions" class="form-control" id="attractions" rows="3" placeholder="List the places you want to visit...">{{ trip.attractions }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="packing_list" class="form-label fw-bold">Packing List</label>
                        <textarea name="packing_list" class="form-control" id="packing_list" rows="2" placeholder="What to bring?">{{ trip.packing_list }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="expense_estimate" class="form-label fw-bold">Expense Breakdown</label>
                        <textarea name="expense_estimate" class="form-control" id="expense_estimate" rows="2" placeholder="Expected costs...">{{ trip.expense_estimate }}</textarea>
                    </div>

                    <div class="mb-4">
                        <label for="notes" class="form-label fw-bold">General Notes</label>
                        <textarea name="notes" class="form-control" id="notes" rows="3">{{ trip.notes }}</textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm py-3">Save Changes</button>
                        <a href="{{ url_for('main.profile') }}" class="btn btn-light rounded-pill">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var initialLat = {{ trip.latitude if trip.latitude else 20 }};
        var initialLng = {{ trip.longitude if trip.longitude else 0 }};
        var initialZoom = {{ 10 if trip.latitude else 2 }};

        var map = L.map('add-trip-map').setView([initialLat, initialLng], initialZoom);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        var marker;
        {% if trip.latitude %}
            marker = L.marker([initialLat, initialLng]).addTo(map);
        {% endif %}

        const countrySelect = document.getElementById('country');
        const destinationSelect = document.getElementById('destination');
        const manualDest = document.getElementById('manual_destination');

        function updateMarker(lat, lng) {
            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lng]).addTo(map);
            map.setView([lat, lng], 10);
            document.getElementById('latitude').value = lat;
            document.getElementById('longitude').value = lng;
        }

        function searchLocation(query) {
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.length > 0) {
                        updateMarker(parseFloat(data[0].lat), parseFloat(data[0].lon));
                    }
                });
        }

        countrySelect.addEventListener('change', function() {
            const country = this.value;
            destinationSelect.innerHTML = '<option value="" disabled selected>Loading cities...</option>';
            
            const query = `[out:json];area["name"="${country}"]->.searchArea;(node["place"="city"](area.searchArea);node["place"="town"](area.searchArea););out body;`;
            fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    destinationSelect.innerHTML = '<option value="" disabled selected>Select a city...</option>';
                    const cities = data.elements
                        .map(e => e.tags.name)
                        .filter((v, i, a) => v && a.indexOf(v) === i)
                        .sort();
                    
                    cities.forEach(city => {
                        const option = document.createElement('option');
                        option.value = city;
                        option.textContent = city;
                        destinationSelect.appendChild(option);
                    });
                })
                .catch(err => {
                    destinationSelect.innerHTML = '<option value="" disabled selected>Error loading cities</option>';
                    console.error(err);
                });
        });

        destinationSelect.addEventListener('change', function() {
            searchLocation(`${this.value}, ${countrySelect.value}`);
        });

        manualDest.addEventListener('change', function() {
            if (this.value) {
                searchLocation(`${this.value}, ${countrySelect.value}`);
                const opt = document.createElement('option');
                opt.value = this.value;
                opt.textContent = this.value;
                opt.selected = true;
                destinationSelect.appendChild(opt);
            }
        });

        document.getElementById('search-btn').addEventListener('click', function() {
            var query = document.getElementById('search-box').value;
            if (!query) return;
            searchLocation(query);
        });

        map.on('click', function(e) {
            updateMarker(e.latlng.lat, e.latlng.lng);
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}`)
                .then(response => response.json())
                .then(data => {
                    if (data.address) {
                        var country = data.address.country;
                        if (country) {
                            for (let i = 0; i < countrySelect.options.length; i++) {
                                if (countrySelect.options[i].value === country) {
                                    countrySelect.selectedIndex = i;
                                    countrySelect.dispatchEvent(new Event('change'));
                                    break;
                                }
                            }
                        }
                    }
                });
        });
    });
</script>
{% endblock %}
