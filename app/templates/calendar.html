{% extends "base.html" %}

{% block content %}
<div class="row mb-4 animate__animated animate__fadeIn">
    <div class="col-md-12">
        <div class="card p-4 shadow-sm border-0">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">{{ _('Travel Calendar') }}</h2>
                <div>
                    <span class="badge bg-primary me-2">{{ _('Upcoming') }}</span>
                    <span class="badge bg-success me-2">{{ _('Visited') }}</span>
                    <span class="badge bg-warning text-dark">{{ _('Planned') }}</span>
                </div>
            </div>
            <div id="calendar" style="min-height: 600px;"></div>
        </div>
    </div>
</div>

<style>
    #calendar {
        background: white;
        padding: 20px;
        border-radius: 15px;
    }
    .fc-event {
        cursor: pointer;
        padding: 2px 5px;
        border-radius: 6px;
        border: none !important;
        font-weight: 600;
        font-size: 0.85em;
    }
    .fc-toolbar-title {
        font-weight: 700 !important;
        color: var(--gnome-text);
    }
    .fc-button-primary {
        background-color: var(--gnome-accent) !important;
        border: none !important;
        border-radius: 10px !important;
        padding: 8px 16px !important;
        font-weight: 600 !important;
    }
    .fc-daygrid-day:hover {
        background-color: rgba(0,0,0,0.02);
    }
</style>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,listMonth'
        },
        buttonText: {
            today: '{{ _("Today") }}',
            month: '{{ _("Month") }}',
            week: '{{ _("Week") }}',
            list: '{{ _("List") }}'
        },
        events: {{ events|tojson }},
        eventClick: function(info) {
            if (info.event.url) {
                info.jsEvent.preventDefault();
                window.location.href = info.event.url;
            }
        },
        height: 'auto',
        firstDay: 1, // Monday
        eventTimeFormat: {
            hour: '2-digit',
            minute: '2-digit',
            meridiem: false,
            hour12: false
        }
    });
    calendar.render();
});
</script>
{% endblock %}
