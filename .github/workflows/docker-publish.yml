name: Docker Build and Publish

on:
  release:
    types: [ published ]

env:
  IMAGE_NAME: nurefexc/my-nomad-plans

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Resolve release version
        id: version
        run: |
          RAW_VERSION="${{ github.event.release.name }}"
          if [ -z "$RAW_VERSION" ] || [ "$RAW_VERSION" = "null" ]; then
            RAW_VERSION="${{ github.event.release.tag_name }}"
          fi

          RAW_VERSION="${RAW_VERSION#refs/tags/}"
          VERSION="${RAW_VERSION#v}"

          if [ -z "$VERSION" ]; then
            echo "Could not determine release version from release name/tag"
            exit 1
          fi

          echo "raw=$RAW_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies for translation
        run: |
          python -m pip install --upgrade pip
          pip install Babel Flask-Babel

      - name: Update translations and manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Configure git
          git config --local user.email "nomad-bot@users.noreply.github.com"
          git config --local user.name "NomadBot"

          # 1st commit: Update manifest.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" manifest.json
          git add manifest.json
          git commit -m "Chore: Bump version to $VERSION in manifest.json" || echo "No manifest changes"
          
          # 2nd commit: Sync translations
          # Extract and update translations to ensure everything is up-to-date
          pybabel extract -F babel.cfg -o messages.pot .
          pybabel update -i messages.pot -d app/translations
          pybabel compile -d app/translations
          git add app/translations/
          git commit -m "I18n: Sync and compile translations for $VERSION" || echo "No translation changes"
          
          # Push both commits
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.tag }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}